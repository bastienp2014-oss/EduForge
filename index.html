<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;600;700&family=Fredoka:wght@400;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Arrive en ville : Apprendre Français québécois et culture</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Guide interactif et d'intégration. Apprenez le français québécois, le slang, passez vos démarches et réussissez votre insertion (SAAQ, RAMQ, logement, vocabulaire)." />
    <meta name="keywords" content="québec, québécois, canada, canadien, french, slang, apprendre, intégration, francisation, dictionnaire, mots mêlés, joual, expressions, SAAQ" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        fetch('/api/debug/error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: message, source: source, lineno: lineno, colno: colno, stack: error ? error.stack : '' })
        });
      };
      window.addEventListener('unhandledrejection', function(event) {
        fetch('/api/debug/error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: event.reason ? event.reason.message : 'Unhandled Rejection', stack: event.reason ? event.reason.stack : '' })
        });
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
